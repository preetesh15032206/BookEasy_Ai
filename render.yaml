services:
  - type: web
    name: bookeasy-app
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bookeasy-db
          property: connectionString
      - key: PINECONE_API_KEY
        sync: false
      - key: APP_GEMINI_API_KEY
        sync: false
      - key: NODE_ENV
        value: production

databases:
  - name: bookeasy-db
    databaseName: bookeasy
    user: bookeasy_user
    plan: free
